name: 问题报告
description: 报告页面错误、数据异常、同步失败或功能故障
title: "[问题] "
body:
  - type: markdown
    attributes:
      value: |
        请先下载当前本地备份，再填写可重复的操作步骤。不要上传真实家谱、凭据或在世人员敏感资料。
  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 用一句话说明发生了什么。
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: 访问地址
      placeholder: https://ftree.dpdns.org
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: 浏览器及版本
      placeholder: 例如 Chrome 140.0
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11、macOS、Android
    validations:
      required: true
  - type: textarea
    id: preconditions
    attributes:
      label: 前置条件
      description: 问题发生前所在页面、数据状态，以及是否刚执行同步、恢复或删除。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 完整复现步骤
      description: 从打开页面开始，按编号写清每一步。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 选择……
        4. 出现……
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 包括错误文字、页面状态和数据是否发生变化。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 正常情况下应该出现什么结果？
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: 出现频率
      options:
        - 每次必现
        - 经常出现
        - 偶尔出现
        - 仅出现一次
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: 影响程度
      options:
        - 严重：可能导致数据丢失或无法继续使用
        - 较高：核心功能不可用
        - 一般：有替代操作但明显影响使用
        - 轻微：显示或体验问题
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 脱敏错误信息或截图
      description: 可粘贴完整错误文字或脱敏截图；不得上传真实家谱、姓名、备注、凭据和精确 GPS。
  - type: textarea
    id: attempts
    attributes:
      label: 已尝试的处理方式
      description: 已执行哪些检查或恢复操作？结果如何？
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已检索现有问题列表，没有发现相同问题。
          required: true
        - label: 我已在继续操作前下载当前本地备份，或确认无法下载。
          required: true
        - label: 我未提交真实家谱、Cookie、Token、Secret、私人备注或精确 GPS。
          required: true
