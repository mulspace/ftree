name: 新需求
description: 提交新功能、体验改进或流程优化建议
title: "[需求] "
body:
  - type: markdown
    attributes:
      value: |
        感谢提出需求。请完整描述场景、目标和可验证结果。不要提交真实家谱、凭据或在世人员敏感资料。
  - type: textarea
    id: background
    attributes:
      label: 背景与痛点
      description: 当前在什么场景遇到了什么限制？谁受到影响？
      placeholder: 请描述现有流程、具体困难和发生频率。
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 需求目标
      description: 希望解决什么问题？请优先描述目标，不要只给出技术方案。
      placeholder: 完成后希望达到的业务或使用目标。
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景与操作流程
      description: 请按顺序说明用户在何时、哪个页面、如何使用该能力。
      placeholder: |
        1. 用户进入……
        2. 用户选择……
        3. 系统应……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果与验收标准
      description: 用可观察、可验证的方式说明完成标准。
      placeholder: 当……时，应……；不得……
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围与边界
      description: 哪些内容属于本需求？明确不包含哪些内容？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 当前替代方案
      description: 目前如何处理？为什么仍不满足？
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 建议优先级
      options:
        - 高：阻断核心使用流程
        - 中：明显影响效率或体验
        - 低：优化建议或未来能力
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: 数据、权限与隐私影响
      description: 是否新增个人资料、第三方服务、OAuth 权限、保存位置或分享范围？没有也请写“无”。
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已检索现有需求列表，没有发现相同需求。
          required: true
        - label: 本 Issue 只包含一个独立需求。
          required: true
        - label: 我未提交真实家谱、凭据、私人备注或精确 GPS。
          required: true
